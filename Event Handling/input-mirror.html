<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <title>Document</title>

  <body>
    <input type="text" id="i1" />
    <h1 id="h1"></h1>

      let h1 = document.getElementById("h1");

        h1.innerText = i1.value;
      });
    </script>
  </body>
